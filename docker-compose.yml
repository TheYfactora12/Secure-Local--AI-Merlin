# home-ai-elite — Full Stack Docker Compose v0.7
# Services: Ollama, Open WebUI, Perplexica, SearXNG, OpenHands, Qdrant, n8n, LiteLLM
#           + Nginx (TLS reverse proxy), Watchtower (auto-updates), Fail2ban (brute-force)
# Start:  docker compose up -d
# Stop:   docker compose down
# Status: bash scripts/status.sh

version: '3.8'

networks:
  ai-net:
    driver: bridge

volumes:
  ollama:
  open-webui:
  qdrant-storage:
  n8n-data:
  perplexica-data:
  nginx-certs:
  fail2ban-data:

services:

  # ─────────────────────────────────────────
  # SECURITY — Nginx TLS Reverse Proxy
  # All services accessible via HTTPS on :443
  # Self-signed cert generated on first boot
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs
    networks:
      - ai-net
    depends_on:
      - open-webui
      - perplexica-frontend
      - n8n
      - qdrant
      - litellm

  # ─────────────────────────────────────────
  # SECURITY — Fail2ban
  # Bans IPs after repeated failed logins
  # Monitors Open WebUI auth logs
  # ─────────────────────────────────────────
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./configs/fail2ban:/data
      - fail2ban-data:/var/lib/fail2ban
      - /var/log:/var/log:ro
    environment:
      - TZ=${TZ:-America/New_York}
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGEAGE=1d

  # ─────────────────────────────────────────
  # SECURITY — Watchtower
  # Auto-updates Docker images silently
  # Runs daily at 3am, notifies on update
  # ─────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_TIMEOUT=30s
      - WATCHTOWER_LOG_LEVEL=info
      - TZ=${TZ:-America/New_York}
    networks:
      - ai-net

  # ─────────────────────────────────────────
  # LAYER 1 — AI Brain (Ollama)
  # Local LLM server — all models run here
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────
  # LAYER 2 — Model Router (LiteLLM)
  # Unified API: local Ollama + optional cloud
  # ─────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./configs/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-home-ai-elite}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-none}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-none}
    networks:
      - ai-net
    depends_on:
      ollama:
        condition: service_healthy

  # ─────────────────────────────────────────
  # LAYER 2 — Chat UI (Open WebUI)
  # Your Perplexity / ChatGPT front end
  # ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://litellm:4000
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-home-ai-elite}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-in-env}
      - WEBUI_NAME=Home AI Elite
      - ENABLE_SIGNUP=true
      - ENABLE_COMMUNITY_SHARING=false
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    networks:
      - ai-net
    depends_on:
      - ollama
      - litellm
      - searxng

  # ─────────────────────────────────────────
  # LAYER 2 — Private Web Search (SearXNG)
  # Powers web search for Open WebUI + Perplexica
  # ─────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - ai-net

  # ─────────────────────────────────────────
  # LAYER 2 — Search AI (Perplexica)
  # Open-source Perplexity clone with citations
  # ─────────────────────────────────────────
  perplexica-backend:
    image: itzcrazykns/perplexica-backend:main
    container_name: perplexica-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./configs/perplexica/config.toml:/home/perplexica/config.toml
      - perplexica-data:/home/perplexica/data
    networks:
      - ai-net
    depends_on:
      - ollama
      - searxng

  perplexica-frontend:
    image: itzcrazykns/perplexica-frontend:main
    container_name: perplexica-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    networks:
      - ai-net
    depends_on:
      - perplexica-backend

  # ─────────────────────────────────────────
  # LAYER 3 — Codex Agent (OpenHands)
  # Autonomous coding agent — your Codex
  # ─────────────────────────────────────────
  openhands:
    image: ghcr.io/all-hands-ai/openhands:main
    container_name: openhands
    restart: unless-stopped
    ports:
      - "3003:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands-state:/.openhands-state
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.38-nikolaik
      - LOG_ALL_EVENTS=true
      - LLM_BASE_URL=http://litellm:4000
      - LLM_API_KEY=${LITELLM_MASTER_KEY:-sk-home-ai-elite}
      - LLM_MODEL=${OPENHANDS_MODEL:-ollama/qwen2.5-coder:14b}
    networks:
      - ai-net
    depends_on:
      - litellm

  # ─────────────────────────────────────────
  # LAYER 4 — Vector Memory (Qdrant)
  # RAG memory store for all services
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - ai-net

  # ─────────────────────────────────────────
  # LAYER 5 — Automation (n8n)
  # AI routing, webhooks, workflow automation
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
    networks:
      - ai-net

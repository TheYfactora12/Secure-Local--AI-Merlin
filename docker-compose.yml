# home-ai-elite — Full Stack Docker Compose v1.1
# Services: Open WebUI, Perplexica, SearXNG, OpenHands, Qdrant, n8n, LiteLLM
#           + Nginx (TLS reverse proxy), Watchtower (auto-updates), Fail2ban (brute-force)
# Start core: docker compose up -d dashboard qdrant litellm open-webui
# Optional capabilities use Compose profiles: search, automation, coding, security, ops.
# Linux full-stack mode:
#   docker compose --profile docker-ollama --profile linux-security up -d
# Stop:   docker compose down
# Status: bash scripts/status.sh
#
# SECURITY NOTE: All secrets MUST be set in .env before starting.
# Run: bash install.sh   (auto-generates all secrets + validates)
# Or:  cp .env.example .env && edit .env manually
# Containers with REQUIRED_CHANGE_ME fallbacks will FAIL TO START
# intentionally if .env is missing — this is by design.
#
# macOS NOTE: Ollama runs NATIVELY (Metal GPU). Services connect through
# host.docker.internal:11434. The Docker Ollama service is behind the
# docker-ollama profile so direct `docker compose up` is safe on macOS.
# On Linux, use install.sh or enable the docker-ollama and linux-security
# profiles manually.

networks:
  ai-net:
    driver: bridge

volumes:
  ollama:
  open-webui:
  qdrant-storage:
  n8n-data:
  perplexica-data:
  fail2ban-data:

services:

  # ───────────────────────────────────────────
  # SECURITY — Nginx TLS Reverse Proxy
  # All services accessible via HTTPS on :443
  # Self-signed cert generated on first boot
  # ───────────────────────────────────────────
  nginx:
    profiles: ["security"]
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_BIND:-127.0.0.1}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_BIND:-127.0.0.1}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - ai-net
    depends_on:
      open-webui:
        condition: service_started
      qdrant:
        condition: service_started
      litellm:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # SECURITY — Fail2ban
  # Bans IPs after repeated failed logins
  # NOTE: network_mode: host required for iptables access.
  # MACOS INCOMPATIBILITY: Docker Desktop on macOS does not support
  # network_mode: host — iptables is not available in the Linux VM.
  # install.sh automatically disables this service on macOS.
  # On Linux (VPS/server deployments), this runs normally.
  # ───────────────────────────────────────────
  fail2ban:
    profiles: ["linux-security"]
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./configs/fail2ban:/data
      - fail2ban-data:/var/lib/fail2ban
      - /var/log:/var/log:ro,nocopy
    environment:
      - TZ=${TZ:-America/New_York}
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGEAGE=1d

  # ───────────────────────────────────────────
  # SECURITY — Watchtower
  # Auto-updates only labeled containers
  # Runs daily at 3am
  # ───────────────────────────────────────────
  watchtower:
    profiles: ["ops"]
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_TIMEOUT=30s
      - WATCHTOWER_LOG_LEVEL=info
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.44
      - TZ=${TZ:-America/New_York}
    networks:
      - ai-net

  # ───────────────────────────────────────────
  # DASHBOARD — Wizard HQ
  # Static local status dashboard
  # ───────────────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: swarm-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_PORT:-8888}:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 1 — AI Brain (Ollama)
  # Local LLM server — all models run here
  # SECURITY: Bound to 127.0.0.1 only.
  # LAN devices must go through LiteLLM proxy.
  # MACOS: This service is scaled to 0 by install.sh.
  #        Ollama runs natively for Metal GPU acceleration.
  #        Services connect via host.docker.internal:11434 on macOS.
  # ───────────────────────────────────────────
  ollama:
    profiles: ["docker-ollama"]
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_BIND:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - ai-net
    deploy:
      resources:
        limits:
          memory: 20g
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Model Router (LiteLLM)
  # Unified API: local Ollama + optional cloud
  # Services use host.docker.internal so macOS can reach native Ollama.
  # Linux Docker-Ollama mode publishes Ollama on the host and reaches it
  # through host-gateway.
  # ───────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_BIND:-127.0.0.1}:${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./configs/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      # REQUIRED: set LITELLM_MASTER_KEY in .env (install.sh auto-generates it)
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-REQUIRED_CHANGE_ME}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-none}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-none}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Chat UI (Open WebUI)
  # Your Perplexity / ChatGPT front end
  # SECURITY: Set ENABLE_SIGNUP=false in .env
  # after creating your admin account.
  # Uses host.docker.internal for native macOS Ollama and Linux host-gateway.
  # ───────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_BIND:-127.0.0.1}:${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_BASE_URL=http://litellm:4000
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-REQUIRED_CHANGE_ME}
      # REQUIRED: set WEBUI_SECRET_KEY in .env (install.sh auto-generates it)
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-REQUIRED_CHANGE_ME}
      - WEBUI_NAME=Wizard AI
      # Set ENABLE_SIGNUP=false in .env after creating your admin account
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - ENABLE_COMMUNITY_SHARING=false
      # Local-first release defaults: prevent first-boot external downloads/checks.
      - OFFLINE_MODE=${OPEN_WEBUI_OFFLINE_MODE:-true}
      - HF_HUB_OFFLINE=${OPEN_WEBUI_HF_HUB_OFFLINE:-1}
      - ENABLE_VERSION_UPDATE_CHECK=${OPEN_WEBUI_ENABLE_VERSION_UPDATE_CHECK:-false}
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=${OPEN_WEBUI_RAG_EMBEDDING_MODEL_AUTO_UPDATE:-false}
      - RAG_RERANKING_MODEL_AUTO_UPDATE=${OPEN_WEBUI_RAG_RERANKING_MODEL_AUTO_UPDATE:-false}
      - WHISPER_MODEL_AUTO_UPDATE=${OPEN_WEBUI_WHISPER_MODEL_AUTO_UPDATE:-false}
      - CORS_ALLOW_ORIGIN=${OPEN_WEBUI_CORS_ALLOW_ORIGIN:-http://localhost:3000}
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ai-net
    depends_on:
      litellm:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Private Web Search (SearXNG)
  # Powers web search for Open WebUI + Perplexica
  # ───────────────────────────────────────────
  searxng:
    profiles: ["search"]
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_BIND:-127.0.0.1}:${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      # REQUIRED: set SEARXNG_SECRET_KEY in .env (install.sh auto-generates it)
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-REQUIRED_CHANGE_ME}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Search AI (Perplexica)
  # Open-source Perplexity clone with citations
  # Uses host.docker.internal for native macOS Ollama and Linux host-gateway.
  # ───────────────────────────────────────────
  perplexica-backend:
    profiles: ["search"]
    image: itzcrazykns1337/perplexica-backend:main
    container_name: perplexica-backend
    restart: unless-stopped
    ports:
      - "${PERPLEXICA_BACKEND_BIND:-127.0.0.1}:${PERPLEXICA_BACKEND_PORT:-3001}:3001"
    volumes:
      - ${PERPLEXICA_CONFIG_FILE:-./configs/perplexica/config.toml}:/home/perplexica/config.toml
      - perplexica-data:/home/perplexica/data
    environment:
      - OLLAMA_HOST=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-net
    depends_on:
      searxng:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  perplexica-frontend:
    profiles: ["search"]
    image: itzcrazykns1337/perplexica-frontend:main
    container_name: perplexica-frontend
    restart: unless-stopped
    ports:
      - "${PERPLEXICA_FRONTEND_BIND:-127.0.0.1}:${PERPLEXICA_FRONTEND_PORT:-3002}:3000"
    environment:
      # NEXT_PUBLIC_* vars are browser-side — localhost is the user's machine, not a container
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    networks:
      - ai-net
    depends_on:
      - perplexica-backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 3 — Codex Agent (OpenHands)
  # Autonomous coding agent — your Codex
  # NOTE: docker.sock mount required for
  #       OpenHands sandbox container execution
  # ───────────────────────────────────────────
  openhands:
    profiles: ["coding"]
    image: ghcr.io/all-hands-ai/openhands:main
    container_name: openhands
    restart: unless-stopped
    ports:
      - "${OPENHANDS_BIND:-127.0.0.1}:${OPENHANDS_PORT:-3003}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands-state:/.openhands-state
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.38-nikolaik
      - LOG_ALL_EVENTS=true
      - LLM_BASE_URL=http://litellm:4000
      - LLM_API_KEY=${LITELLM_MASTER_KEY:-REQUIRED_CHANGE_ME}
      - LLM_MODEL=${OPENHANDS_MODEL:-ollama/qwen2.5-coder:14b}
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - ai-net
    depends_on:
      litellm:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 4 — Vector Memory (Qdrant)
  # RAG memory store for all services
  # SECURITY: gRPC port 6334 NOT exposed —
  # no service uses gRPC; REST on 6333 only.
  # ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_BIND:-127.0.0.1}:${QDRANT_REST_PORT:-6333}:6333"
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 5 — Automation (n8n)
  # AI routing, webhooks, workflow automation
  # Pinned to stable minor version — do not
  # change to :latest (breaks silently)
  # ───────────────────────────────────────────
  n8n:
    profiles: ["automation"]
    image: n8nio/n8n:1.87.1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_BIND:-127.0.0.1}:${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      # REQUIRED: set N8N_PASSWORD in .env (install.sh auto-generates it)
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-REQUIRED_CHANGE_ME}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-REQUIRED_CHANGE_ME}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - WEBHOOK_URL=http://localhost:5678
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ai-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

# home-ai-elite — Full Stack Docker Compose v1.1
# Services: Open WebUI, Perplexica, SearXNG, OpenHands, Qdrant, n8n, LiteLLM
#           + Nginx (TLS reverse proxy), Watchtower (auto-updates), Fail2ban (brute-force)
# Start:  docker compose up -d
# Stop:   docker compose down
# Status: bash scripts/status.sh
#
# SECURITY NOTE: All secrets MUST be set in .env before starting.
# Run: bash install.sh   (auto-generates all secrets + validates)
# Or:  cp .env.example .env && edit .env manually
# Containers with REQUIRED_CHANGE_ME fallbacks will FAIL TO START
# intentionally if .env is missing — this is by design.
#
# macOS NOTE: install.sh patches this file automatically for macOS:
#   - Ollama runs NATIVELY (Metal GPU) — ollama service scaled to 0
#   - fail2ban disabled (network_mode:host unsupported on Docker Desktop)
#   - OLLAMA_BASE_URL rewritten to host.docker.internal:11434
# On Linux, no patches are applied and all services run in Docker.

networks:
  ai-net:
    driver: bridge

volumes:
  ollama:
  open-webui:
  qdrant-storage:
  n8n-data:
  perplexica-data:
  fail2ban-data:

services:

  # ───────────────────────────────────────────
  # SECURITY — Nginx TLS Reverse Proxy
  # All services accessible via HTTPS on :443
  # Self-signed cert generated on first boot
  # ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - ai-net
    depends_on:
      open-webui:
        condition: service_started
      n8n:
        condition: service_started
      qdrant:
        condition: service_started
      litellm:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # SECURITY — Fail2ban
  # Bans IPs after repeated failed logins
  # NOTE: network_mode: host required for iptables access.
  # MACOS INCOMPATIBILITY: Docker Desktop on macOS does not support
  # network_mode: host — iptables is not available in the Linux VM.
  # install.sh automatically disables this service on macOS.
  # On Linux (VPS/server deployments), this runs normally.
  # ───────────────────────────────────────────
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./configs/fail2ban:/data
      - fail2ban-data:/var/lib/fail2ban
      - /var/log:/var/log:ro,nocopy
    environment:
      - TZ=${TZ:-America/New_York}
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGEAGE=1d

  # ───────────────────────────────────────────
  # SECURITY — Watchtower
  # Auto-updates only labeled containers
  # Runs daily at 3am
  # ───────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_TIMEOUT=30s
      - WATCHTOWER_LOG_LEVEL=info
      - WATCHTOWER_LABEL_ENABLE=true
      - DOCKER_API_VERSION=1.44
      - TZ=${TZ:-America/New_York}
    networks:
      - ai-net

  # ───────────────────────────────────────────
  # LAYER 1 — AI Brain (Ollama)
  # Local LLM server — all models run here
  # SECURITY: Bound to 127.0.0.1 only.
  # LAN devices must go through LiteLLM proxy.
  # MACOS: This service is scaled to 0 by install.sh.
  #        Ollama runs natively for Metal GPU acceleration.
  #        Services connect via host.docker.internal:11434 on macOS.
  # ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks:
      - ai-net
    deploy:
      resources:
        limits:
          memory: 20g
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Model Router (LiteLLM)
  # Unified API: local Ollama + optional cloud
  # MACOS: OLLAMA_BASE_URL patched to host.docker.internal by install.sh
  # ───────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./configs/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      # REQUIRED: set LITELLM_MASTER_KEY in .env (install.sh auto-generates it)
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-REQUIRED_CHANGE_ME}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-none}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-none}
      # On macOS, install.sh rewrites this to http://host.docker.internal:11434
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    networks:
      - ai-net
    depends_on:
      ollama:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Chat UI (Open WebUI)
  # Your Perplexity / ChatGPT front end
  # SECURITY: Set ENABLE_SIGNUP=false in .env
  # after creating your admin account.
  # MACOS: OLLAMA_BASE_URL patched to host.docker.internal by install.sh
  # ───────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      # On macOS, install.sh rewrites this to http://host.docker.internal:11434
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OPENAI_API_BASE_URL=http://litellm:4000
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-REQUIRED_CHANGE_ME}
      # REQUIRED: set WEBUI_SECRET_KEY in .env (install.sh auto-generates it)
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-REQUIRED_CHANGE_ME}
      - WEBUI_NAME=Wizard AI
      # Set ENABLE_SIGNUP=false in .env after creating your admin account
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - ENABLE_COMMUNITY_SHARING=false
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ai-net
    depends_on:
      ollama:
        condition: service_started
      litellm:
        condition: service_started
      searxng:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Private Web Search (SearXNG)
  # Powers web search for Open WebUI + Perplexica
  # ───────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      # REQUIRED: set SEARXNG_SECRET_KEY in .env (install.sh auto-generates it)
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-REQUIRED_CHANGE_ME}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 2 — Search AI (Perplexica)
  # Open-source Perplexity clone with citations
  # MACOS: OLLAMA_BASE_URL patched to host.docker.internal by install.sh
  # ───────────────────────────────────────────
  perplexica-backend:
    image: itzcrazykns1337/perplexica-backend:main
    container_name: perplexica-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./configs/perplexica/config.toml:/home/perplexica/config.toml
      - perplexica-data:/home/perplexica/data
    environment:
      # On macOS, install.sh rewrites this to http://host.docker.internal:11434
      - OLLAMA_HOST=${OLLAMA_BASE_URL:-http://ollama:11434}
    networks:
      - ai-net
    depends_on:
      ollama:
        condition: service_started
      searxng:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  perplexica-frontend:
    image: itzcrazykns1337/perplexica-frontend:main
    container_name: perplexica-frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      # NEXT_PUBLIC_* vars are browser-side — localhost is the user's machine, not a container
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    networks:
      - ai-net
    depends_on:
      - perplexica-backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 3 — Codex Agent (OpenHands)
  # Autonomous coding agent — your Codex
  # NOTE: docker.sock mount required for
  #       OpenHands sandbox container execution
  # ───────────────────────────────────────────
  openhands:
    image: ghcr.io/all-hands-ai/openhands:main
    container_name: openhands
    restart: unless-stopped
    ports:
      - "3003:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands-state:/.openhands-state
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:0.38-nikolaik
      - LOG_ALL_EVENTS=true
      - LLM_BASE_URL=http://litellm:4000
      - LLM_API_KEY=${LITELLM_MASTER_KEY:-REQUIRED_CHANGE_ME}
      - LLM_MODEL=${OPENHANDS_MODEL:-ollama/qwen2.5-coder:14b}
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - ai-net
    depends_on:
      litellm:
        condition: service_started
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 4 — Vector Memory (Qdrant)
  # RAG memory store for all services
  # SECURITY: gRPC port 6334 NOT exposed —
  # no service uses gRPC; REST on 6333 only.
  # ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ───────────────────────────────────────────
  # LAYER 5 — Automation (n8n)
  # AI routing, webhooks, workflow automation
  # Pinned to stable minor version — do not
  # change to :latest (breaks silently)
  # ───────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.87.1
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n-workflows:/home/node/workflows
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      # REQUIRED: set N8N_PASSWORD in .env (install.sh auto-generates it)
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-REQUIRED_CHANGE_ME}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-REQUIRED_CHANGE_ME}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - ai-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

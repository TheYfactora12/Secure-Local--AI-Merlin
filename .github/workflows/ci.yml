name: CI — Validate Installer & Stack

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: ShellCheck — Lint all .sh files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on all scripts
        run: |
          find . -name '*.sh' \
            -not -path './.git/*' \
            | sort \
            | xargs shellcheck --severity=warning --shell=bash --exclude=SC1091,SC2034
          echo "✅ All shell scripts passed ShellCheck"

  compose-validate:
    name: Docker Compose — Validate config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create .env from example
        run: cp .env.example .env
      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml is valid"
      - name: Validate docker-compose.base.yml
        run: |
          docker compose -f docker-compose.base.yml config --quiet
          echo "✅ docker-compose.base.yml is valid"

  install-dryrun:
    name: install.sh — Syntax & dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check install.sh syntax
        run: |
          bash -n install.sh
          echo "✅ install.sh syntax OK"
      - name: Check all scripts syntax (scripts/ + launchd/ + pkg/scripts/ + tests/ + cli)
        run: |
          for f in scripts/*.sh launchd/*.sh pkg/scripts/*.sh tests/*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f" && echo "  ✅ $f" || (echo "  ❌ $f FAILED" && exit 1)
          done
          bash -n cli/wizard && echo "  ✅ cli/wizard"
      - name: Verify .env.example required keys
        run: |
          for key in OLLAMA_BASE_URL WEBUI_SECRET_KEY N8N_ENCRYPTION_KEY N8N_API_KEY QDRANT_URL; do
            grep -q "^${key}=" .env.example \
              && echo "  ✅ $key" \
              || (echo "  ❌ Missing: $key" && exit 1)
          done

  validate-workflows:
    name: n8n Workflows — Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate workflow JSON
        run: |
          if [ -z "$(find n8n-workflows -name '*.json' 2>/dev/null)" ]; then
            echo "No workflow files found — skipping"; exit 0
          fi
          FAIL=0
          for f in n8n-workflows/*.json; do
            jq empty "$f" 2>/dev/null && echo "  ✅ $f" || (echo "  ❌ $f" && FAIL=1)
          done
          [ $FAIL -eq 0 ] || exit 1

  validate-configs:
    name: Configs — Validate YAML & PLIST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install yamllint
      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Validate YAML configs
        run: |
          for f in configs/**/*.yml configs/**/*.yaml; do
            [ -f "$f" ] || continue
            yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" "$f" \
              && echo "  ✅ $f" || echo "  ⚠️  $f (non-blocking)"
          done
      - name: Validate plist XML
        run: |
          for f in launchd/*.plist; do
            [ -f "$f" ] || continue
            xmllint --noout "$f" 2>/dev/null && echo "  ✅ $f" || (echo "  ❌ $f" && exit 1)
          done

  static-smoke-tests:
    name: Static smoke tests — profiles, memory, release safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run static smoke tests
        run: |
          bash tests/profile-selection-smoke.sh
          bash tests/compose-profile-gating-smoke.sh
          bash tests/config-root-smoke.sh
          bash tests/merlin-config-validate-smoke.sh
          bash tests/memory-config-smoke.sh
          bash tests/benchmark-smoke.sh
          bash tests/wizard-memory-config-smoke.sh
          bash tests/doctor-model-smoke.sh
          bash tests/installer-model-pull-policy-smoke.sh
          bash tests/installer-merlin-api-policy-smoke.sh
          bash tests/update-upgrade-profile-smoke.sh
          bash tests/backup-profile-smoke.sh
          bash tests/upgrade-rollback-smoke.sh
          bash tests/search-profile-smoke.sh
          bash tests/automation-profile-smoke.sh
          bash tests/coding-profile-smoke.sh
          bash tests/openwebui-local-first-smoke.sh
          bash tests/merlin-persona-smoke.sh
          bash tests/merlin-staff-skills-smoke.sh
          bash tests/master-prompt-smoke.sh
          bash tests/merlin-policy-smoke.sh
          bash tests/merlin-routing-smoke.sh
          bash tests/merlin-orchestration-smoke.sh
          bash tests/merlin-trace-smoke.sh
          bash tests/observability-design-smoke.sh
          bash tests/langfuse-observability-profile-smoke.sh
          bash tests/merlin-observability-export-smoke.sh
          bash tests/n8n-local-langfuse-trace-smoke.sh
          bash tests/merlin-score-smoke.sh
          bash tests/merlin-trace-view-smoke.sh
          bash tests/merlin-dry-run-smoke.sh
          bash tests/merlin-approvals-smoke.sh
          bash tests/merlin-status-smoke.sh
          bash tests/merlin-ask-smoke.sh
          bash tests/merlin-execute-smoke.sh
          bash tests/merlin-magic-plan-smoke.sh
          bash tests/merlin-audit-view-smoke.sh
          bash tests/merlin-memory-write-smoke.sh
          bash tests/merlin-memory-read-smoke.sh
          bash tests/merlin-status-api-smoke.sh
          bash tests/wizard-start-status-api-smoke.sh
          bash tests/dashboard-merlin-status-smoke.sh
          bash tests/dashboard-security-center-smoke.sh
          bash tests/dashboard-readiness-smoke.sh
          bash tests/dashboard-first-run-smoke.sh
          bash tests/dashboard-tabs-smoke.sh
          bash tests/dashboard-native-chat-smoke.sh
          bash tests/dashboard-model-readiness-smoke.sh
          bash tests/uninstall-smoke.sh
          bash tests/launchd-core-smoke.sh
          bash tests/sast-gitleaks-smoke.sh
          bash tests/container-image-policy-smoke.sh
          bash tests/installer-branding-smoke.sh
          bash tests/control-plane-strategy-smoke.sh
          bash tests/beta-readiness-evidence-smoke.sh
          bash tests/release-readiness-readme-smoke.sh
          bash tests/ci-actions-node-runtime-smoke.sh
          bash tests/pkg-readiness-smoke.sh
          bash tests/pkg-local-sign-smoke.sh
          bash tests/pkg-signing-preflight-smoke.sh
          bash tests/release-workflow-smoke.sh
          echo "✅ Static smoke tests passed"

  secret-scan:
    name: Security — Secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for hardcoded secret patterns
        run: |
          echo "Scanning for hardcoded API key patterns..."
          FAIL=0
          # OpenAI keys
          if grep -rn --include='*.sh' --include='*.yml' --include='*.yaml' --include='*.json' \
            -E 'sk-[a-zA-Z0-9]{32,}' \
            --exclude-dir='.git' --exclude='*.example' . 2>/dev/null; then
            echo "❌ Potential OpenAI API key found"
            FAIL=1
          fi
          # Google API keys
          if grep -rn --include='*.sh' --include='*.yml' --include='*.yaml' \
            -E 'AIza[a-zA-Z0-9_-]{35}' \
            --exclude-dir='.git' --exclude='*.example' . 2>/dev/null; then
            echo "❌ Potential Google API key found"
            FAIL=1
          fi
          # GitHub PATs
          if grep -rn --include='*.sh' --include='*.yml' --include='*.yaml' \
            -E 'ghp_[a-zA-Z0-9]{36}' \
            --exclude-dir='.git' --exclude='*.example' . 2>/dev/null; then
            echo "❌ Potential GitHub PAT found"
            FAIL=1
          fi
          if [ $FAIL -eq 0 ]; then
            echo "✅ No hardcoded API key patterns found"
          fi
          [ $FAIL -eq 0 ] || exit 1

  gitleaks-scan:
    name: Security — gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks with repo config
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:v8.24.3 \
            detect \
            --source /repo \
            --config /repo/.gitleaks.toml \
            --no-banner \
            --redact \
            --exit-code 1
          echo "✅ gitleaks scan passed"

  merlin-staff-core-pytest:
    name: Merlin Staff Core — Python unit tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies (network — pip only)
        run: |
          pip install --quiet \
            pytest \
            pytest-mock \
            pydantic \
            pyyaml \
            httpx \
            starlette \
            fastapi \
            uvicorn
          echo "✅ Test dependencies installed"

      - name: Verify YAML configs parseable (master prompt + team skin)
        run: |
          python - <<'PYEOF'
          import pathlib
          import sys
          import yaml

          required_persona_keys = ["name", "voice", "guardian_ethos", "team_modes"]
          required_team_modes = {
              "Architect": "architect",
              "AI Engineer": "ai_engineer",
              "Software Engineer": "software_engineer",
              "Security Reviewer": "security_reviewer",
              "Product Designer": "product_designer",
              "Operator": "operator",
          }

          persona_path = pathlib.Path("configs/merlin/persona.yaml")
          if not persona_path.exists():
              print(f"❌ {persona_path} not found")
              sys.exit(1)

          data = yaml.safe_load(persona_path.read_text()) or {}
          persona = data.get("persona", {})
          if not isinstance(persona, dict):
              print("❌ persona.yaml missing top-level persona mapping")
              sys.exit(1)

          missing_keys = [key for key in required_persona_keys if key not in persona]
          if missing_keys:
              print(f"❌ persona.yaml missing keys: {missing_keys}")
              sys.exit(1)

          team_modes = persona.get("team_modes", {})
          if not isinstance(team_modes, dict):
              print("❌ persona.yaml team_modes must be a mapping")
              sys.exit(1)

          missing_modes = [
              display_name
              for display_name, mode_key in required_team_modes.items()
              if mode_key not in team_modes
          ]
          if missing_modes:
              print(f"❌ persona.yaml missing team modes: {missing_modes}")
              sys.exit(1)

          print(f"✅ persona.yaml valid — {len(team_modes)} team modes confirmed")
          PYEOF

      - name: Run Merlin Staff Core Python unit tests (offline, no live services)
        run: |
          python -m pytest \
            tests/test_config_loader.py \
            tests/test_memory_manager.py \
            tests/test_policy_engine.py \
            tests/test_router.py \
            tests/test_session_memory_bridge.py \
            tests/test_status_extension.py \
            tests/test_task_endpoint.py \
            tests/test_outcome_observer.py \
            --ignore=tests/test_memory_manager_integration.py \
            -k "not integration and not live" \
            -v \
            --tb=short \
            --no-header \
            -q
          echo "✅ Merlin Staff Core Python tests passed"

  ci-success:
    name: CI Passed
    needs:
      - shellcheck
      - compose-validate
      - install-dryrun
      - validate-workflows
      - validate-configs
      - static-smoke-tests
      - secret-scan
      - gitleaks-scan
      - merlin-staff-core-pytest
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All CI checks passed — home-ai-elite installer is valid"

# Perplexica Config — merlin-ai
# Open-source Perplexity AI clone
# Docs: https://github.com/ItzCrazyKns/Perplexica

[GENERAL]
PORT = 3001
SIMILARITY_MEASURE = "cosine"

[API_KEYS]
# Cloud API keys — optional, leave blank to use local models only
OPENAI = ""
GROQ = ""

[API_ENDPOINTS]
# host.docker.internal reaches native macOS Ollama and Linux Docker-Ollama via host-gateway
OLLAMA = "http://host.docker.internal:11434"
SEARXNG = "http://searxng:8080"

[MODELS]
# install.sh writes RAM-tier overrides to ignored config.runtime.toml
CHAT_MODEL_PROVIDER = "ollama"
CHAT_MODEL = "qwen2.5:7b"
EMBEDDING_MODEL_PROVIDER = "ollama"
EMBEDDING_MODEL = "nomic-embed-text"

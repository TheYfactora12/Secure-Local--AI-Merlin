# home-ai-elite — Nginx Reverse Proxy (v0.7)
# Self-signed TLS for all local services
# Cert generated by scripts/generate-certs.sh on first boot

worker_processes auto;
events { worker_connections 1024; }

http {
  # ───────────────────────
  # Security headers (applied globally)
  # ───────────────────────
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  add_header Referrer-Policy "strict-origin-when-cross-origin";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  server_tokens off;

  # ───────────────────────
  # Rate limiting
  # ───────────────────────
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  # ───────────────────────
  # HTTP → HTTPS redirect
  # ───────────────────────
  server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
  }

  # ───────────────────────
  # HTTPS — Main proxy block
  # ───────────────────────
  server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Open WebUI (main chat UI)
    location / {
      proxy_pass         http://open-webui:8080;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      # Rate limit login endpoint
      location /api/auth {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://open-webui:8080;
      }
    }

    # Perplexica (AI search)
    location /perplexica/ {
      proxy_pass         http://perplexica-frontend:3000/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # n8n (automation)
    location /n8n/ {
      proxy_pass         http://n8n:5678/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # LiteLLM API (rate limited)
    location /api/llm/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://litellm:4000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Qdrant (internal only — not exposed externally in prod)
    location /qdrant/ {
      proxy_pass http://qdrant:6333/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # SearXNG
    location /search/ {
      proxy_pass http://searxng:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
